<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عجلة الحظ - IChancey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f1a; --fg: #ffffff; --accent: #fbbf24; --accent-dark: #b45309;
            --card: #1a1a2e; --border: #2d2d44; --success: #10b981; --danger: #ef4444;
            --free-spin: #06b6d4;
        }
        * { font-family: 'Tajawal', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; min-height: 100vh; background: var(--bg); color: var(--fg); overflow-x: hidden; }
        .bg-layer { position: fixed; inset: 0; background: radial-gradient(circle at 50% 0%, rgba(251, 191, 36, 0.08) 0%, transparent 50%); pointer-events: none; z-index: 0; }
        
        .jackpot-card { background: linear-gradient(180deg, #1f1f35 0%, #16162a 100%); border: 1px solid var(--accent); border-radius: 16px; position: relative; overflow: hidden; box-shadow: 0 0 30px rgba(251, 191, 36, 0.15); }
        .jackpot-card::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); animation: shine 4s infinite; }
        @keyframes shine { 0% { left: -100%; } 50%, 100% { left: 100%; } }
        .jackpot-value { font-size: clamp(1.8rem, 6vw, 3rem); font-weight: 900; background: linear-gradient(to bottom, #fcd34d, #f59e0b, #b45309); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .wheel-stage { position: relative; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .wheel-glow { position: absolute; width: 320px; height: 320px; background: radial-gradient(circle, rgba(251, 191, 36, 0.2) 0%, transparent 70%); filter: blur(25px); animation: pulse 3s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }

        .pointer-box { position: absolute; top: 0px; left: 50%; transform: translateX(-50%); z-index: 50; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.6)); }
        .spin-btn-main { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(145deg, #fbbf24, #d97706); border: 3px solid #92400e; color: #1a1a2e; font-weight: 900; font-size: 1rem; cursor: pointer; z-index: 40; box-shadow: 0 8px 25px rgba(0,0,0,0.4); transition: all 0.2s; }
        .spin-btn-main:active:not(:disabled) { transform: translate(-50%, -50%) scale(0.95); }
        .spin-btn-main:disabled { opacity: 0.6; cursor: not-allowed; }
        .spin-btn-main.free-spin-active { background: linear-gradient(145deg, #06b6d4, #0891b2); border-color: #0e7490; animation: pulse-btn 2s infinite; }
        @keyframes pulse-btn { 0%, 100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4); } 50% { box-shadow: 0 0 0 10px rgba(6, 182, 212, 0); } }

        .user-panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; }
        .balance-num { font-size: 1.5rem; font-weight: 900; color: var(--success); }
        .free-spin-badge { background: var(--free-spin); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; animation: bounce 1s infinite; display: inline-block; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        .result-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 200; opacity: 0; visibility: hidden; transition: 0.3s; }
        .result-modal.show { opacity: 1; visibility: visible; }
        .result-box { background: var(--card); border: 2px solid var(--accent); border-radius: 24px; padding: 2rem; text-align: center; max-width: 320px; transform: scale(0.8); transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .result-modal.show .result-box { transform: scale(1); }
        
        .confetti-layer { position: fixed; inset: 0; pointer-events: none; z-index: 150; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1f1f35; border: 1px solid var(--danger); padding: 12px 24px; border-radius: 12px; font-weight: bold; z-index: 300; opacity: 0; transition: 0.3s; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<!-- عناصر الصوت -->
<audio id="soundSpin" src="https://www.soundjay.com/misc/sounds/magic-chime-01.mp3" preload="auto"></audio>
<audio id="soundWin" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" preload="auto"></audio>
<audio id="soundLose" src="https://www.soundjay.com/misc/sounds/fail-buzzer-01.mp3" preload="auto"></audio>

<div class="bg-layer"></div>

<main class="relative z-10 max-w-md mx-auto px-4 py-6">
    
    <!-- الجاكبوت -->
    <section class="jackpot-card p-4 mb-6 text-center">
        <div class="text-xs text-gray-400 uppercase tracking-wider">Jackpot</div>
        <div class="jackpot-value my-1" id="displayJackpot">0</div>
        <div class="text-xs text-gray-500">ليرة سورية</div>
    </section>

    <!-- معلومات المستخدم -->
    <section class="user-panel p-4 mb-6">
        <div class="flex justify-between items-center">
            <div>
                <div class="text-gray-400 text-xs">رصيدك</div>
                <div class="balance-num" id="displayBalance">جاري التحميل...</div>
                <div id="freeSpinStatus" class="hidden mt-1">
                    <span class="free-spin-badge">لديك لفة مجانية!</span>
                </div>
            </div>
            <a href="https://t.me/ichancey_cash_bot?start=deposit" class="px-4 py-2 rounded-lg text-sm font-bold transition-all" style="background: var(--success); color: white;">
                إيداع
            </a>
        </div>
        <div class="flex justify-between items-center mt-3 pt-3 border-t border-gray-700 text-sm">
            <span class="text-gray-400">سعر اللفة:</span>
            <span style="color: var(--accent); font-weight: bold;">2,000 ل.س</span>
        </div>
    </section>

    <!-- العجلة -->
    <section class="wheel-stage mb-8">
        <div class="wheel-glow"></div>
        <div class="pointer-box">
            <svg width="40" height="40" viewBox="0 0 40 40">
                <path d="M20 40 L0 0 L40 0 Z" fill="url(#pGrad)" stroke="#92400e" stroke-width="2"/>
                <defs><linearGradient id="pGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#b45309"/><stop offset="100%" stop-color="#fcd34d"/></linearGradient></defs>
            </svg>
        </div>
        <canvas id="wheelCanvas" width="320" height="320"></canvas>
        <button class="spin-btn-main" id="btnSpin">ابقِ<br>دور</button>
    </section>

</main>

<!-- نافذة النتيجة -->
<div class="result-modal" id="modalResult">
    <div class="result-box">
        <div class="text-5xl mb-3" id="resIcon">🎁</div>
        <h2 class="text-xl font-bold mb-2" style="color:var(--accent);" id="resTitle">تهانينا!</h2>
        <p class="text-2xl font-black mb-4" id="resPrize">الجائزة</p>
        <p class="text-sm text-gray-400 mb-4" id="resMsg"></p>
        <button onclick="hideModal()" class="w-full py-3 rounded-xl font-bold" style="background:var(--accent); color:#000;">حسناً</button>
    </div>
</div>

<div class="confetti-layer" id="confettiBox"></div>
<div class="toast" id="toastBox"></div>

<script>
    // ===================== الإعدادات =====================
    const CONFIG = {
        pricePerSpin: 2000,
        baseUrl: 'https://unbegrudged-direfully-nu.ngrok-free.dev' // غيّر هذا الرابط إذا تغير Ngrok
    };

    // ===================== الجوائز =====================
    const PRIZES = [
        { label: '5,000,000', sub: 'ل.س', color: '#dc2626', type: 'jackpot', icon: '💎' },
        { label: 'آيفون 15', sub: 'Pro Max', color: '#1d4ed8', type: 'phone', icon: '📱' },
        { label: '1,000,000', sub: 'ل.س', color: '#16a34a', type: 'cash', icon: '💰' },
        { label: 'سامسونج', sub: 'S24 Ultra', color: '#7c3aed', type: 'phone', icon: '📱' },
        { label: '500,000', sub: 'ل.س', color: '#16a34a', type: 'cash', icon: '💵' },
        { label: 'ساعة ذكية', sub: 'Apple Watch', color: '#0891b2', type: 'gadget', icon: '⌚' },
        { label: 'لفة مجانية', sub: 'بدون خصم', color: '#06b6d4', type: 'free_spin', icon: '🔄' }, // Index 6
        { label: 'AirPods', sub: 'Pro 2', color: '#6366f1', type: 'gadget', icon: '🎧' },
        { label: '100,000', sub: 'ل.س', color: '#16a34a', type: 'cash', icon: '💵' },
        { label: 'حظ أوفر', sub: '', color: '#4b5563', type: 'lose', icon: '💔' }, // Index 9
    ];

    // ===================== الحالة =====================
    let state = {
        balance: 0,
        jackpot: 15000000,
        isSpinning: false,
        currentRotation: 0,
        userId: null,
        userName: 'زائر',
        hasFreeSpin: false
    };

    let tgApp = null;

    // ===================== أدوات الصوت =====================
    function playSound(id) {
        try {
            const sound = document.getElementById(id);
            if (sound) {
                sound.currentTime = 0;
                sound.play().catch(e => console.log("Audio blocked:", e));
            }
        } catch (e) {}
    }

    // ===================== تهيئة تيليجرام =====================
    async function initTelegram() {
        try {
            tgApp = window.Telegram.WebApp;
            tgApp.ready();
            tgApp.expand();
            document.body.style.backgroundColor = tgApp.backgroundColor || '#0f0f1a';

            if (tgApp.initDataUnsafe && tgApp.initDataUnsafe.user) {
                const u = tgApp.initDataUnsafe.user;
                state.userId = u.id;
                state.userName = u.first_name || 'مستخدم';
                await fetchUserData(); 
            } else {
                state.userId = 12345678;
                state.balance = 5000;
                state.userName = "وضع المعاينة";
                updateUI();
            }
        } catch (e) {
            console.error('Telegram Init Error', e);
        }
    }

    // ===================== دالة جلب الرصيد والجاكبوت =====================
    async function fetchUserData() {
        try {
            const url = CONFIG.baseUrl + '/api/get_me';
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: state.userId,
                    init_data: window.Telegram.WebApp.initData
                })
            });
            
            const data = await response.json();
            
            if (data.success) {
                state.balance = data.balance;
                state.hasFreeSpin = data.has_free_spin;
                if (data.jackpot) state.jackpot = data.jackpot;
                updateUI();
            } else {
                document.getElementById('displayBalance').textContent = "سجل في البوت";
            }
        } catch (e) {
            console.error("Error fetching balance", e);
            showToast("فشل الاتصال بالسيرفر");
        }
    }

    // ===================== رسم العجلة =====================
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const radius = Math.min(cx, cy) - 5;
    const sliceAngle = (2 * Math.PI) / PRIZES.length;

    function drawWheel() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        PRIZES.forEach((prize, i) => {
            const startAngle = i * sliceAngle - Math.PI / 2;
            const endAngle = startAngle + sliceAngle;

            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, radius, startAngle, endAngle);
            ctx.closePath();

            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
            grad.addColorStop(0, lighten(prize.color, 40));
            grad.addColorStop(1, prize.color);
            ctx.fillStyle = grad;
            ctx.fill();

            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.save();
            ctx.translate(cx, cy);
            const textAngle = startAngle + sliceAngle / 2;
            ctx.rotate(textAngle);
            ctx.translate(radius * 0.65, 0);
            ctx.rotate(Math.PI / 2);

            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.7)';
            ctx.shadowBlur = 4;

            ctx.font = 'bold 14px Tajawal';
            ctx.fillText(prize.label, 0, -8);
            if (prize.sub) {
                ctx.font = '11px Tajawal';
                ctx.fillText(prize.sub, 0, 8);
            }
            ctx.restore();
        });

        ctx.beginPath();
        ctx.arc(cx, cy, 45, 0, 2 * Math.PI);
        const centerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 45);
        centerGrad.addColorStop(0, '#2a2a4a');
        centerGrad.addColorStop(1, '#1a1a2e');
        ctx.fillStyle = centerGrad;
        ctx.fill();
        ctx.strokeStyle = '#fbbf24';
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    function lighten(hex, percent) {
        const num = parseInt(hex.replace('#', ''), 16);
        const amt = Math.round(2.55 * percent);
        const R = Math.min(255, (num >> 16) + amt);
        const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
        const B = Math.min(255, (num & 0x0000FF) + amt);
        return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
    }

    // ===================== منطق الدوران =====================
    async function spin() {
        if (state.isSpinning) return;

        if (!state.hasFreeSpin && state.balance < CONFIG.pricePerSpin) {
            showToast('رصيد غير كافي، قم بالإيداع أولاً');
            return;
        }

        state.isSpinning = true;
        const btn = document.getElementById('btnSpin');
        btn.disabled = true;
        btn.innerHTML = 'انتظر<br>...';
        
        playSound('soundSpin');

        try {
            const response = await fetch(CONFIG.baseUrl + '/api/spin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: state.userId,
                    init_data: window.Telegram.WebApp.initData,
                    is_free_spin: state.hasFreeSpin
                })
            });

            const data = await response.json();

            if (data.success) {
                state.balance = data.new_balance;
                state.hasFreeSpin = data.has_free_spin;
                if (data.jackpot) state.jackpot = data.jackpot;
                
                // نمرر الفهرس القادم من البوت (سيكون 6 أو 9 فقط)
                animateWheel(data.prize_index);
            } else {
                showToast(data.message || 'حدث خطأ');
                resetSpinButton();
            }

        } catch (e) {
            console.error(e);
            showToast('فشل الاتصال بالسيرفر');
            resetSpinButton();
        }
    }

    function animateWheel(prizeIndex) {
        // حساب زاوية الوقوف بناءً على الفهرس الحقيقي
        const prizeAngleDeg = (prizeIndex * (360 / PRIZES.length)) + (360 / PRIZES.length / 2);
        const spins = 5 + Math.floor(Math.random() * 3);
        const stopAtDeg = 360 - prizeAngleDeg;
        const totalRotationDeg = (spins * 360) + stopAtDeg;
        const totalRotationRad = totalRotationDeg * (Math.PI / 180);

        state.currentRotation += totalRotationRad;

        canvas.style.transition = 'transform 6s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
        canvas.style.transform = `rotate(${state.currentRotation}rad)`;

        setTimeout(() => {
            // نمرر الجائزة الحقيقية التي وقف عليها السهم
            handleResult(PRIZES[prizeIndex]);
            resetSpinButton();
        }, 6200);
    }

    function handleResult(prize) {
        // الآن prize هو الكائن الحقيقي (إما لفة مجانية أو حظ أوفر)
        if (prize.type === 'free_spin') {
            playSound('soundWin');
            showResult(prize, true, false, true);
        } else {
            playSound('soundLose');
            showResult(prize, false, false);
        }
        updateUI();
    }

    function showResult(prize, isWin, isJackpot, isFreeSpinWin = false) {
        document.getElementById('resIcon').textContent = prize.icon;
        
        if (isFreeSpinWin) {
            document.getElementById('resTitle').textContent = 'رائع!';
            document.getElementById('resPrize').textContent = 'لفة مجانية!';
            document.getElementById('resMsg').textContent = 'لقد ربحت لفة مجانية! ادر العجلة مجدداً.';
        } else {
            document.getElementById('resTitle').textContent = isWin ? (isJackpot ? 'جاكبوت!' : 'مبروك!') : 'حظ أوفر';
            document.getElementById('resPrize').textContent = isWin ? `${prize.label} ${prize.sub}` : 'حاول مرة أخرى';
            document.getElementById('resMsg').textContent = isWin ? 'تم إضافة الجائزة لرصيدك' : 'الجاكبوت يكبر! حاول مجدداً';
        }

        document.getElementById('modalResult').classList.add('show');
        if (isWin || isFreeSpinWin) createConfetti();
    }

    function hideModal() { document.getElementById('modalResult').classList.remove('show'); }

    function resetSpinButton() {
        state.isSpinning = false;
        const btn = document.getElementById('btnSpin');
        btn.disabled = false;
        btn.innerHTML = 'ابقِ<br>دور';
        updateUI();
    }

    // ===================== واجهة المستخدم =====================
    function updateUI() {
        document.getElementById('displayBalance').textContent = state.balance.toLocaleString();
        document.getElementById('displayJackpot').textContent = state.jackpot.toLocaleString();

        const btn = document.getElementById('btnSpin');
        const statusDiv = document.getElementById('freeSpinStatus');
        if (state.hasFreeSpin) {
            btn.classList.add('free-spin-active');
            statusDiv.classList.remove('hidden');
        } else {
            btn.classList.remove('free-spin-active');
            statusDiv.classList.add('hidden');
        }
    }

    function showToast(msg) {
        const box = document.getElementById('toastBox');
        box.textContent = msg;
        box.classList.add('show');
        setTimeout(() => box.classList.remove('show'), 3000);
    }

    function createConfetti() {
        const box = document.getElementById('confettiBox');
        const colors = ['#fbbf24', '#ef4444', '#22c55e', '#3b82f6', '#06b6d4'];
        for (let i = 0; i < 50; i++) {
            const p = document.createElement('div');
            p.className = 'confetti-particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.width = Math.random() * 10 + 5 + 'px';
            p.style.height = p.style.width;
            p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            p.style.animationDelay = Math.random() * 0.5 + 's';
            p.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
            box.appendChild(p);
        }
        setTimeout(() => box.innerHTML = '', 4000);
    }

    // ===================== البدء =====================
    document.addEventListener('DOMContentLoaded', () => {
        initTelegram();
        drawWheel();
        document.getElementById('btnSpin').addEventListener('click', spin);
        document.getElementById('modalResult').addEventListener('click', (e) => {
            if (e.target.id === 'modalResult') hideModal();
        });
    });
</script>
</body>
</html>
