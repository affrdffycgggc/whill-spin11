<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عجلة الحظ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0f1a; --fg: #ffffff; --accent: #fbbf24; --card: #1a1a2e; --border: #2d2d44; --success: #10b981; --danger: #ef4444; --free-spin: #06b6d4; }
        * { font-family: 'Tajawal', sans-serif; box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--fg); overflow: hidden; }
        .bg-layer { position: fixed; inset: 0; background: radial-gradient(circle at 50% 0%, rgba(251, 191, 36, 0.1) 0%, transparent 60%); pointer-events: none; }
        
        .jackpot-card { background: linear-gradient(180deg, #1f1f35 0%, #16162a 100%); border: 1px solid var(--accent); border-radius: 16px; box-shadow: 0 0 30px rgba(251, 191, 36, 0.1); }
        .jackpot-value { font-size: 2rem; font-weight: 900; background: linear-gradient(to bottom, #fcd34d, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .wheel-stage { position: relative; width: 320px; height: 320px; margin: 20px auto; }
        .wheel-glow { position: absolute; inset: -20px; background: radial-gradient(circle, rgba(251, 191, 36, 0.2) 0%, transparent 70%); filter: blur(20px); animation: pulse 4s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .pointer-box { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); z-index: 50; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8)); }
        .pointer-box svg { width: 30px; height: 40px; }
        
        .spin-btn-main { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(145deg, #fbbf24, #d97706); border: 3px solid #fff; color: #000; font-weight: 900; font-size: 0.9rem; cursor: pointer; z-index: 40; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .spin-btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
        .spin-btn-main.free-spin-active { background: linear-gradient(145deg, #06b6d4, #0891b2); border-color: #fff; }

        .user-panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; }
        .balance-num { font-size: 1.5rem; font-weight: 900; color: var(--success); }
        .free-spin-badge { background: var(--free-spin); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; animation: bounce 1s infinite; display: inline-block; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        .result-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 200; opacity: 0; visibility: hidden; transition: 0.3s; }
        .result-modal.show { opacity: 1; visibility: visible; }
        .result-box { background: var(--card); border: 2px solid var(--accent); border-radius: 24px; padding: 2rem; text-align: center; max-width: 320px; transform: scale(0.8); transition: 0.3s; }
        .result-modal.show .result-box { transform: scale(1); }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1f1f35; border: 1px solid var(--danger); padding: 12px 24px; border-radius: 12px; font-weight: bold; z-index: 300; opacity: 0; transition: 0.3s; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="bg-layer"></div>

<main class="relative z-10 max-w-md mx-auto px-4 py-6">
    <section class="jackpot-card p-4 mb-6 text-center">
        <div class="text-xs text-gray-400 uppercase tracking-wider">Jackpot</div>
        <div class="jackpot-value my-1" id="displayJackpot">0</div>
    </section>

    <section class="user-panel p-4 mb-6">
        <div class="flex justify-between items-center">
            <div>
                <!-- تمت إضافة مكان للاسم -->
                <div class="text-gray-400 text-xs">مرحباً، <span id="displayUsername" class="text-white font-bold">...</span></div>
                <div class="balance-num" id="displayBalance">...</div>
                <div id="freeSpinStatus" class="hidden mt-1"><span class="free-spin-badge">لفة مجانية!</span></div>
            </div>
            <a href="https://t.me/ichancey_cash_bot?start=deposit" class="px-4 py-2 rounded-lg text-sm font-bold" style="background: var(--success); color: white;">إيداع</a>
        </div>
    </section>

    <section class="wheel-stage mb-8">
        <div class="wheel-glow"></div>
        <div class="pointer-box">
            <svg viewBox="0 0 30 40">
                <path d="M15 40 L0 0 L30 0 Z" fill="#000" stroke="#fbbf24" stroke-width="2"/>
            </svg>
        </div>
        <canvas id="wheelCanvas" width="320" height="320"></canvas>
        <button class="spin-btn-main" id="btnSpin">دور<br>الآن</button>
    </section>
</main>

<div class="result-modal" id="modalResult">
    <div class="result-box">
        <div class="text-5xl mb-3" id="resIcon">🎁</div>
        <h2 class="text-xl font-bold mb-2" style="color:var(--accent);" id="resTitle">النتيجة</h2>
        <p class="text-2xl font-black mb-4" id="resPrize">الجائزة</p>
        <button onclick="hideModal()" class="w-full py-3 rounded-xl font-bold" style="background:var(--accent); color:#000;">حسناً</button>
    </div>
</div>
<div class="toast" id="toastBox"></div>

<script>
    const CONFIG = {
        pricePerSpin: 2000,
        baseUrl: 'https://unbegrudged-direfully-nu.ngrok-free.dev' // غيّر الرابط إذا لزم الأمر
    };

    const PRIZES = [
        { label: '5,000,000', sub: 'ل.س', color: '#dc2626', type: 'cash', icon: '💎' },
        { label: '2,000,000', sub: 'ل.س', color: '#16a34a', type: 'cash', icon: '💰' },
        { label: '1,000,000', sub: 'ل.س', color: '#16a34a', type: 'cash', icon: '💰' },
        { label: '800,000', sub: 'ل.س', color: '#16a34a', type: 'cash', icon: '💵' },
        { label: '500,000', sub: 'ل.س', color: '#16a34a', type: 'cash', icon: '💵' },
        { label: '300,000', sub: 'ل.س', color: '#16a34a', type: 'cash', icon: '💵' },
        { label: 'لفة مجانية', sub: 'هدية', color: '#06b6d4', type: 'free_spin', icon: '🔄' },
        { label: '200,000', sub: 'ل.س', color: '#16a34a', type: 'cash', icon: '💵' },
        { label: '100,000', sub: 'ل.س', color: '#16a34a', type: 'cash', icon: '💵' },
        { label: 'حظ أوفر', sub: 'خسارة', color: '#4b5563', type: 'lose', icon: '💔' },
    ];

    let state = { balance: 0, jackpot: 15000000, isSpinning: false, currentRotation: 0, userId: null, userName: 'زائر', hasFreeSpin: false };
    let tgApp = null;

    async function initTelegram() {
        try {
            tgApp = window.Telegram.WebApp; tgApp.ready(); tgApp.expand();
            if (tgApp.initDataUnsafe && tgApp.initDataUnsafe.user) {
                state.userId = tgApp.initDataUnsafe.user.id;
                await fetchUserData(); 
            } else {
                // وضع المعاينة أو عدم التسجيل
                showToast("⚠️ يجب فتح الموقع من البوت بعد التسجيل");
                document.getElementById('btnSpin').disabled = true;
                document.getElementById('btnSpin').innerHTML = "🚫<br>ممنوع";
                document.getElementById('displayUsername').textContent = "زائر";
                document.getElementById('displayBalance').textContent = "0";
            }
        } catch (e) { console.error(e); }
    }

    async function fetchUserData() {
        try {
            const res = await fetch(CONFIG.baseUrl + '/api/get_me', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: state.userId })
            });
            const data = await res.json();
            if (data.success) {
                state.balance = data.balance;
                state.hasFreeSpin = data.has_free_spin;
                state.jackpot = data.jackpot;
                state.userName = data.username || "مستخدم";
                // تحديث الاسم في الواجهة
                document.getElementById('displayUsername').textContent = state.userName;
                updateUI();
            } else {
                // المستخدم موجود في تيليجرام لكن غير مسجل في البوت
                showToast("⚠️ أنت غير مسجل في البوت");
                document.getElementById('btnSpin').disabled = true;
                document.getElementById('btnSpin').innerHTML = "سجل<br>أولاً";
                document.getElementById('displayUsername').textContent = "غير مسجل";
                document.getElementById('displayBalance').textContent = "0";
            }
        } catch (e) { showToast("فشل الاتصال بالسيرفر"); }
    }

    const canvas = document.getElementById('wheelCanvas'); const ctx = canvas.getContext('2d');
    const cx = canvas.width / 2; const cy = canvas.height / 2; const radius = 150;
    const sliceAngle = (2 * Math.PI) / PRIZES.length;

    function drawWheel() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        PRIZES.forEach((p, i) => {
            const startAngle = i * sliceAngle - Math.PI / 2; const endAngle = startAngle + sliceAngle;
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, radius, startAngle, endAngle); ctx.closePath();
            ctx.fillStyle = p.color; ctx.fill();
            ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
            ctx.save();
            ctx.translate(cx, cy); ctx.rotate(startAngle + sliceAngle / 2); ctx.translate(radius * 0.7, 0); ctx.rotate(Math.PI / 2);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Tajawal'; ctx.textAlign = 'center'; ctx.shadowColor='#000'; ctx.shadowBlur=4;
            ctx.fillText(p.label, 0, -6); ctx.font = '10px Tajawal'; ctx.fillText(p.sub, 0, 8);
            ctx.restore();
        });
        ctx.beginPath(); ctx.arc(cx, cy, 35, 0, 2 * Math.PI); ctx.fillStyle='#1a1a2e'; ctx.fill(); ctx.strokeStyle='#fbbf24'; ctx.lineWidth=3; ctx.stroke();
    }

    async function spin() {
        if (state.isSpinning) return;
        if (!state.userId) { showToast("يجب التسجيل أولاً"); return; }
        if (!state.hasFreeSpin && state.balance < CONFIG.pricePerSpin) { showToast('رصيد غير كافي'); return; }
        state.isSpinning = true; document.getElementById('btnSpin').disabled = true; document.getElementById('btnSpin').innerHTML='...';
        
        try {
            const res = await fetch(CONFIG.baseUrl + '/api/spin', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: state.userId, is_free_spin: state.hasFreeSpin })
            });
            const data = await res.json();
            if (data.success) {
                state.balance = data.new_balance; state.hasFreeSpin = data.has_free_spin; state.jackpot = data.jackpot;
                animateWheel(data.prize_index);
            } else { showToast(data.message); state.isSpinning = false; updateUI(); }
        } catch(e) { showToast("خطأ اتصال"); state.isSpinning = false; updateUI(); }
    }

    function animateWheel(targetIndex) {
        const targetAngleDeg = (targetIndex * 36) + 18;
        const stopAtDeg = 360 - targetAngleDeg;
        const spins = 5 + Math.floor(Math.random() * 3);
        const totalRotationDeg = (spins * 360) + stopAtDeg;
        canvas.style.transition = 'transform 5s cubic-bezier(0.2, 0.8, 0.3, 1)';
        canvas.style.transform = `rotate(${totalRotationDeg}deg)`;
        state.currentRotation = totalRotationDeg;
        setTimeout(() => {
            handleResult(PRIZES[targetIndex]);
            state.isSpinning = false; updateUI();
        }, 5200);
    }

    function handleResult(prize) {
        document.getElementById('resIcon').textContent = prize.icon;
        document.getElementById('resTitle').textContent = prize.type === 'lose' ? 'حظ أوفر' : 'مبروك!';
        document.getElementById('resPrize').textContent = prize.label + ' ' + prize.sub;
        document.getElementById('modalResult').classList.add('show');
    }

    function hideModal() { document.getElementById('modalResult').classList.remove('show'); }

    function updateUI() {
        document.getElementById('displayBalance').textContent = state.balance.toLocaleString();
        document.getElementById('displayJackpot').textContent = state.jackpot.toLocaleString();
        const btn = document.getElementById('btnSpin');
        btn.disabled = state.isSpinning;
        btn.innerHTML = state.isSpinning ? '...' : (state.hasFreeSpin ? 'مجاني<br>دور' : 'دور<br>الآن');
        btn.classList.toggle('free-spin-active', state.hasFreeSpin);
        document.getElementById('freeSpinStatus').classList.toggle('hidden', !state.hasFreeSpin);
    }

    function showToast(msg) { const b = document.getElementById('toastBox'); b.textContent = msg; b.classList.add('show'); setTimeout(() => b.classList.remove('show'), 3000); }

    document.addEventListener('DOMContentLoaded', () => { initTelegram(); drawWheel(); document.getElementById('btnSpin').addEventListener('click', spin); });
</script>
</body>
</html>
